<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senha / Loading</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f0f0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .iphone-frame {
      width: 393px;
      height: 852px;
      background: #000;
      border-radius: 47px;
      padding: 9px;
      position: relative;
    }
    .iphone-screen {
      width: 375px;
      height: 834px;
      background: #fff;
      border-radius: 40px;
      overflow: hidden;
      position: relative;
    }
    .screen {
      width: 375px;
      height: 812px;
      position: relative;
      background: #FFFFFF;
      overflow: hidden;
    }

    /* ====== 7.1 Password Screen ====== */
    .pin-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 10; }

    .pin-status-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 18px 24px 10px 32px;
      height: 48px;
    }
    .pin-status-time {
      font-family: 'SF Pro Text', -apple-system, sans-serif;
      font-weight: 600;
      font-size: 15px;
      line-height: 20px;
      letter-spacing: -0.24px;
      color: rgba(0,0,0,0.96);
    }
    .pin-status-icons { display: flex; gap: 5px; align-items: center; }

    .pin-nav {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 24px;
    }
    .pin-back {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
    }

    .pin-title-section {
      padding: 8px 24px 24px;
    }
    .pin-title {
      font-weight: 500;
      font-size: 20px;
      line-height: 120%;
      letter-spacing: -0.4px;
      color: rgba(0,0,0,0.96);
    }

    .pin-dots {
      display: flex;
      justify-content: center;
      gap: 24px;
      padding-top: 24px;
    }
    .pin-dot-wrapper {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pin-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(0,0,0,0.32);
    }
    .pin-dot.filled {
      background: rgba(0,0,0,0.64);
    }

    .pin-keyboard {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 375px;
      height: 216px;
      background: #D0D5DB;
      display: flex;
      flex-wrap: wrap;
      padding: 4px 8px;
      gap: 0;
    }
    .key-row {
      width: 100%;
      display: flex;
      gap: 6px;
      margin-bottom: 4px;
    }
    .key-btn {
      flex: 1;
      height: 46px;
      background: #FFFFFF;
      border: none;
      border-radius: 4px;
      box-shadow: 0px 1px 0px rgba(0,0,0,0.35);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .key-btn:active { background: #d0d0d0; }
    .key-num {
      font-family: 'SF Pro Text', -apple-system, sans-serif;
      font-weight: 400;
      font-size: 24px;
      line-height: 28px;
      color: #030303;
    }
    .key-letters {
      font-family: 'SF Pro Text', -apple-system, sans-serif;
      font-weight: 400;
      font-size: 10px;
      letter-spacing: 1px;
      color: #030303;
      margin-top: -2px;
    }
    .key-empty {
      flex: 1;
      height: 46px;
      background: transparent;
      border: none;
    }
    .key-delete {
      flex: 1;
      height: 46px;
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ====== 7.2 / 7.3 / 7.4 Loading Screens ====== */
    .loading-screen {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #fff;
      z-index: 5;
      display: none;
    }
    .loading-screen.visible { display: flex; flex-direction: column; justify-content: flex-end; }

    .loading-content {
      padding: 0 0 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .loading-titles {
      width: 375px;
      display: flex;
      flex-direction: column;
    }
    .loading-step {
      padding: 24px;
    }
    .loading-step-text {
      font-weight: 500;
      font-size: 36px;
      line-height: 110%;
      letter-spacing: -1.08px;
      color: rgba(0,0,0,0.96);
    }
    .loading-step-text.faded {
      color: rgba(0,0,0,0.32);
    }
    .loading-step-text.hidden {
      opacity: 0;
    }

    .loading-progress {
      width: 327px;
      height: 4px;
      background: #EFEFEF;
      border-radius: 64px;
      overflow: hidden;
    }
    .loading-progress-bar {
      height: 4px;
      background: #714F8F;
      border-radius: 64px;
      transition: width 1.5s ease;
    }
  </style>
</head>
<body>

  <div class="iphone-frame">
    <div class="iphone-screen">
      <div class="screen">

        <!-- 7.1 Pin Screen -->
        <div class="pin-screen" id="pin-screen">
          <div class="pin-status-bar">
            <div class="pin-status-time">11:08</div>
            <div class="pin-status-icons">
              <svg width="17" height="11" viewBox="0 0 17 11" fill="none"><path d="M2 6.667C2.552 6.667 3 7.115 3 7.667V9.667C3 10.219 2.552 10.667 2 10.667H1C0.448 10.667 0 10.219 0 9.667V7.667C0 7.115 0.448 6.667 1 6.667H2ZM6.667 4.667C7.219 4.667 7.667 5.115 7.667 5.667V9.667C7.667 10.219 7.219 10.667 6.667 10.667H5.667C5.115 10.667 4.667 10.219 4.667 9.667V5.667C4.667 5.115 5.115 4.667 5.667 4.667H6.667ZM11.333 2.333C11.885 2.333 12.333 2.781 12.333 3.333V9.667C12.333 10.219 11.885 10.667 11.333 10.667H10.333C9.781 10.667 9.333 10.219 9.333 9.667V3.333C9.333 2.781 9.781 2.333 10.333 2.333H11.333ZM16 0C16.552 0 17 0.448 17 1V9.667C17 10.219 16.552 10.667 16 10.667H15C14.448 10.667 14 10.219 14 9.667V1C14 0.448 14.448 0 15 0H16Z" fill="rgba(0,0,0,0.96)"/></svg>
              <svg width="15" height="11" viewBox="0 0 15.334 11" fill="none"><path d="M5.949 8.427C7.229 7.344 9.106 7.344 10.386 8.427C10.45 8.485 10.488 8.568 10.489 8.654C10.491 8.741 10.456 8.824 10.395 8.885L8.39 10.907C8.331 10.967 8.251 11 8.167 11C8.083 11 8.003 10.967 7.944 10.907L5.939 8.885C5.877 8.824 5.843 8.741 5.845 8.654C5.847 8.568 5.884 8.485 5.948 8.427ZM3.273 5.73C6.032 3.165 10.304 3.165 13.064 5.73C13.126 5.79 13.161 5.872 13.162 5.959C13.163 6.045 13.129 6.128 13.068 6.19L11.909 7.36C11.79 7.48 11.597 7.482 11.475 7.365C10.569 6.546 9.389 6.092 8.167 6.092C6.946 6.092 5.768 6.546 4.862 7.365C4.74 7.482 4.546 7.48 4.427 7.36L3.269 6.19C3.208 6.128 3.173 6.045 3.174 5.959C3.175 5.872 3.21 5.79 3.273 5.73ZM0.597 3.039C4.829 -1.013 11.504 -1.013 15.736 3.039C15.798 3.099 15.833 3.182 15.833 3.268C15.833 3.353 15.8 3.436 15.739 3.497L14.579 4.667C14.46 4.787 14.265 4.788 14.144 4.67C12.531 3.138 10.392 2.284 8.167 2.284C5.942 2.284 3.802 3.138 2.19 4.67C2.068 4.788 1.874 4.787 1.755 4.667L0.594 3.497C0.533 3.436 0.5 3.353 0.5 3.268C0.501 3.182 0.536 3.099 0.597 3.039Z" fill="rgba(0,0,0,0.96)"/></svg>
              <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.833" width="21" height="10.333" rx="3.5" stroke="rgba(0,0,0,0.96)" stroke-opacity="0.35"/><path opacity="0.4" d="M23 4V8C23.805 7.661 24.328 6.873 24.328 6C24.328 5.127 23.805 4.339 23 4" fill="rgba(0,0,0,0.96)"/><rect x="2" y="2.333" width="18" height="7.333" rx="2.3" fill="rgba(0,0,0,0.96)"/></svg>
            </div>
          </div>

          <div class="pin-nav">
            <button class="pin-back" id="pin-back">
              <svg width="24" height="24" viewBox="0 0 20 20" fill="none">
                <g transform="translate(5.955, 2.744)">
                  <path d="M0.244078 6.66667L6.91074 0L8.08926 1.17851L2.01184 7.25592L8.08926 13.3333L6.91074 14.5118L0.244078 7.84518C-0.0813592 7.51974 -0.0813592 6.9921 0.244078 6.66667Z" fill="rgba(0,0,0,0.64)"/>
                </g>
              </svg>
            </button>
          </div>

          <div class="pin-title-section">
            <div class="pin-title">Digite sua senha de 4 dígitos para confirmar seu pedido</div>
          </div>

          <div class="pin-dots" id="pin-dots">
            <div class="pin-dot-wrapper"><div class="pin-dot" id="dot-0"></div></div>
            <div class="pin-dot-wrapper"><div class="pin-dot" id="dot-1"></div></div>
            <div class="pin-dot-wrapper"><div class="pin-dot" id="dot-2"></div></div>
            <div class="pin-dot-wrapper"><div class="pin-dot" id="dot-3"></div></div>
          </div>

          <div class="pin-keyboard">
            <div class="key-row">
              <button class="key-btn" data-num="1"><span class="key-num">1</span></button>
              <button class="key-btn" data-num="2"><span class="key-num">2</span><span class="key-letters">ABC</span></button>
              <button class="key-btn" data-num="3"><span class="key-num">3</span><span class="key-letters">DEF</span></button>
            </div>
            <div class="key-row">
              <button class="key-btn" data-num="4"><span class="key-num">4</span><span class="key-letters">GHI</span></button>
              <button class="key-btn" data-num="5"><span class="key-num">5</span><span class="key-letters">JKL</span></button>
              <button class="key-btn" data-num="6"><span class="key-num">6</span><span class="key-letters">MNO</span></button>
            </div>
            <div class="key-row">
              <button class="key-btn" data-num="7"><span class="key-num">7</span><span class="key-letters">PQRS</span></button>
              <button class="key-btn" data-num="8"><span class="key-num">8</span><span class="key-letters">TUV</span></button>
              <button class="key-btn" data-num="9"><span class="key-num">9</span><span class="key-letters">WXYZ</span></button>
            </div>
            <div class="key-row">
              <div class="key-empty"></div>
              <button class="key-btn" data-num="0"><span class="key-num">0</span></button>
              <button class="key-delete" id="key-delete">
                <svg width="23" height="17" viewBox="0 0 23 17" fill="none">
                  <path d="M8.38 0.5H20.5C21.605 0.5 22.5 1.395 22.5 2.5V14.5C22.5 15.605 21.605 16.5 20.5 16.5H8.38C7.869 16.5 7.38 16.294 7.024 15.928L1.044 9.72C0.652 9.313 0.652 8.687 1.044 8.28L7.024 2.072C7.38 1.706 7.869 1.5 8.38 0.5ZM8.38 2.5L2.794 8.5L8.38 14.5H20.5V2.5H8.38ZM12.086 5.914L14.5 8.328L16.914 5.914L18.328 7.328L15.914 9.742L18.328 12.156L16.914 13.57L14.5 11.156L12.086 13.57L10.672 12.156L13.086 9.742L10.672 7.328L12.086 5.914Z" fill="#030303"/>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Loading screen (7.2, 7.3, 7.4) -->
        <div class="loading-screen" id="loading-screen">
          <div class="loading-content">
            <div class="loading-titles" id="loading-titles">
              <div class="loading-step" id="step1">
                <div class="loading-step-text" id="step1-text">Pedindo sua Roxinha...</div>
              </div>
              <div class="loading-step" id="step2" style="display:none;">
                <div class="loading-step-text" id="step2-text">Conferindo o endereço...</div>
              </div>
              <div class="loading-step" id="step3" style="display:none;">
                <div class="loading-step-text" id="step3-text">Pronto!</div>
              </div>
            </div>
            <div class="loading-progress">
              <div class="loading-progress-bar" id="progress-bar" style="width: 0%;"></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    var pinDigits = [];
    var dots = [
      document.getElementById('dot-0'),
      document.getElementById('dot-1'),
      document.getElementById('dot-2'),
      document.getElementById('dot-3')
    ];

    function updateDots() {
      for (var i = 0; i < 4; i++) {
        if (i < pinDigits.length) {
          dots[i].classList.add('filled');
        } else {
          dots[i].classList.remove('filled');
        }
      }
    }

    document.querySelectorAll('.key-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        if (pinDigits.length >= 4) return;
        pinDigits.push(btn.dataset.num);
        updateDots();
        if (pinDigits.length === 4) {
          setTimeout(startLoading, 500);
        }
      });
    });

    document.getElementById('key-delete').addEventListener('click', function() {
      if (pinDigits.length > 0) {
        pinDigits.pop();
        updateDots();
      }
    });

    document.getElementById('pin-back').addEventListener('click', function() {
      window.location.href = 'screen-6-1.html';
    });

    function startLoading() {
      document.getElementById('pin-screen').style.display = 'none';
      var loadingScreen = document.getElementById('loading-screen');
      loadingScreen.classList.add('visible');

      var progressBar = document.getElementById('progress-bar');
      var step1 = document.getElementById('step1');
      var step1Text = document.getElementById('step1-text');
      var step2 = document.getElementById('step2');
      var step2Text = document.getElementById('step2-text');
      var step3 = document.getElementById('step3');
      var step3Text = document.getElementById('step3-text');

      // 7.2: "Pedindo sua Roxinha..." progress 50%
      setTimeout(function() {
        progressBar.style.width = '50%';
      }, 100);

      // 7.3: Fade step1, show step2, progress ~83%
      setTimeout(function() {
        step1Text.classList.add('faded');
        step2.style.display = '';
        progressBar.style.width = '83%';
      }, 2500);

      // 7.4: Show step3 "Pronto!", hide step1/step2, progress 100%
      setTimeout(function() {
        step1.style.display = 'none';
        step2.style.display = 'none';
        step3.style.display = '';
        progressBar.style.width = '100%';
      }, 5000);

      // Navigate to success screen (7.5) after 7.4 completes
      setTimeout(function() {
        window.location.href = 'screen-7-5.html';
      }, 7000);
    }
  </script>

</body>
</html>

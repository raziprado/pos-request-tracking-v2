<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tela 2.1 - Onde receber a roxinha</title>
  <style>
    @font-face {
      font-family: 'Graphik';
      src: url('assets/fonts/Graphik-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Graphik';
      src: url('assets/fonts/Graphik-Medium.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Graphik';
      src: url('assets/fonts/Graphik-Semibold.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'GraphikText';
      src: url('assets/fonts/Graphik-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'GraphikText';
      src: url('assets/fonts/Graphik-Medium.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'GraphikText';
      src: url('assets/fonts/Graphik-Semibold.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    button, input, select, textarea { font-family: inherit; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #F2F2F7;
      font-family: 'Graphik', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .iphone-frame {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100vh;
      background: none;
      border-radius: 0;
      box-shadow: none;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .iphone-screen {
      width: 100%;
      height: 100%;
      background: #FFFFFF;
      border-radius: 0;
      overflow: hidden;
      position: relative;
    }

    .screen {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: #FFFFFF;
      position: relative;
    }

    /* ── Top ── */
    .top-section {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    /* ── Status Bar ── */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 18px 24px 10px 32px;
      width: 100%;
      height: 48px;
    }
    .status-bar-time {
      font-family: -apple-system, 'SF Pro Text', BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      font-size: 15px;
      line-height: 20px;
      color: rgba(0, 0, 0, 0.96);
      letter-spacing: -0.24px;
    }
    .status-bar-icons {
      display: flex;
      align-items: center;
      gap: 5.5px;
    }

    /* ── Top Bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      position: relative;
      width: 100%;
      height: 56px;
    }
    .back-button {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }
    .progress-bar-container {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      width: 128px;
      height: 2px;
      background: #EFEFEF;
      border-radius: 64px;
    }
    .progress-bar-indicator {
      width: 64px;
      height: 2px;
      background: #714F8F;
      border-radius: 64px;
    }

    /* ── Title ── */
    .title-section {
      padding: 8px 24px 24px;
      width: 100%;
    }
    .title-text {
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 28px;
      line-height: 120%;
      letter-spacing: -0.84px;
      color: rgba(0, 0, 0, 0.96);
    }

    /* ── Address Section ── */
    .address-section {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    /* ── Address Block (address + delivery grouped) ── */
    .address-block {
      display: flex;
      flex-direction: column;
      width: 100%;
      cursor: pointer;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: #EFEFEF;
    }

    /* ── Address Row ── */
    .address-row {
      display: flex;
      align-items: center;
      padding: 12px 24px;
      gap: 16px;
      width: 100%;
    }

    /* ── Radio ── */
    .radio-outer {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      position: relative;
    }
    .radio-border {
      box-sizing: border-box;
      width: 24px;
      height: 24px;
      border: 2px solid #6A6A6A;
      border-radius: 50%;
    }
    .radio-fill {
      display: none;
      position: absolute;
      width: 12px;
      height: 12px;
      left: 6px;
      top: 6px;
      background: #714F8F;
      border-radius: 50%;
    }
    .address-block.selected .radio-fill {
      display: block;
    }

    /* ── Address Text ── */
    .address-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      flex: 1;
    }
    .primary-label {
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 16px;
      line-height: 130%;
      letter-spacing: -0.16px;
      color: rgba(0, 0, 0, 0.96);
    }
    .description-text {
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 150%;
      letter-spacing: -0.14px;
      color: rgba(0, 0, 0, 0.64);
    }

    /* ── Trailing Pencil ── */
    .trailing-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Delivery Row ── */
    .delivery-row {
      display: flex;
      align-items: center;
      padding: 0px 24px;
      gap: 16px;
      width: 100%;
      height: 24px;
      margin-bottom: 8px;
    }
    .delivery-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .delivery-label {
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 130%;
      letter-spacing: -0.14px;
      color: rgba(0, 0, 0, 0.64);
    }

    /* ── Ghost Button ── */
    .btn-ghost {
      display: flex;
      align-items: center;
      padding: 12px 24px;
      gap: 8px;
      height: 48px;
      background: transparent;
      border: none;
      cursor: pointer;
    }
    .btn-ghost span {
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 16px;
      line-height: 130%;
      letter-spacing: -0.16px;
      color: #652590;
    }

    /* ── Bottom Bar ── */
    .bottom-bar {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 16px 24px;
      width: 100%;
      height: 80px;
      background: #FFFFFF;
    }
    .btn-primary {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 327px;
      height: 48px;
      background: #714F8F;
      border-radius: 64px;
      border: none;
      cursor: pointer;
      padding: 12px 24px;
    }
    .btn-primary span {
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 16px;
      line-height: 130%;
      letter-spacing: -0.16px;
      color: #FFFFFF;
      text-align: center;
    }
  </style>
</head>

  <script>
    function selectAddress(block) {
      document.querySelectorAll('.address-block').forEach(function(b) {
        b.classList.remove('selected');
      });
      block.classList.add('selected');

      var label = block.querySelector('.primary-label').textContent;
      var desc = block.querySelector('.description-text').innerHTML;
      localStorage.setItem('pos-selected-address', JSON.stringify({ label: label, desc: desc }));
    }

    var defaultBlock = document.querySelector('.address-block.selected');
    if (defaultBlock) {
      var label = defaultBlock.querySelector('.primary-label').textContent;
      var desc = defaultBlock.querySelector('.description-text').innerHTML;
      localStorage.setItem('pos-selected-address', JSON.stringify({ label: label, desc: desc }));
    }

    document.querySelector('.back-button').addEventListener('click', function() {
      window.location.href = 'index.html';
    });

    document.querySelector('.btn-ghost').addEventListener('click', function() {
      window.location.href = 'screen-2-2.html';
    });

    document.getElementById('btn-continuar-21').addEventListener('click', function() {
      window.location.href = 'screen-3-1.html';
    });
  </script>

</body>
</html>

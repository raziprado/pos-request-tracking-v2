<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tela 2.6 - Versão completa</title>
  <style>
    @font-face {
      font-family: 'Graphik';
      src: url('assets/fonts/Graphik-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Graphik';
      src: url('assets/fonts/Graphik-Medium.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Graphik';
      src: url('assets/fonts/Graphik-Semibold.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'GraphikText';
      src: url('assets/fonts/Graphik-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'GraphikText';
      src: url('assets/fonts/Graphik-Medium.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'GraphikText';
      src: url('assets/fonts/Graphik-Semibold.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    button, input, select, textarea { font-family: inherit; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #F2F2F7;
      font-family: 'Graphik', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .iphone-frame {
      position: relative;
      width: 393px;
      height: 852px;
      background: #1C1C1E;
      border-radius: 55px;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.08),
        0 0 0 2px #2c2c2e,
        0 0 0 4px #1a1a1c,
        0 30px 80px rgba(0,0,0,0.4);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .iphone-screen {
      width: 375px;
      height: 812px;
      background: #FFFFFF;
      border-radius: 47px;
      overflow: hidden;
      position: relative;
    }

    .screen {
      width: 375px;
      height: 812px;
      background: #FFFFFF;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Status Bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 18px 24px 10px 32px;
      width: 375px;
      height: 48px;
      flex-shrink: 0;
    }
    .status-bar-time {
      font-family: -apple-system, 'SF Pro Text', sans-serif;
      font-weight: 400;
      font-size: 15px;
      line-height: 20px;
      color: rgba(0, 0, 0, 0.96);
      letter-spacing: -0.24px;
    }
    .status-bar-icons {
      display: flex;
      align-items: center;
      gap: 5.5px;
    }

    /* Top Bar */
    .top-bar {
      display: flex;
      align-items: center;
      position: relative;
      width: 375px;
      height: 56px;
      flex-shrink: 0;
    }
    .back-button {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }
    .progress-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 128px;
      height: 2px;
      background: #EFEFEF;
      border-radius: 64px;
    }
    .progress-indicator {
      width: 64px;
      height: 2px;
      background: #714F8F;
      border-radius: 64px;
    }

    /* Title Section */
    .title-section {
      padding: 8px 24px 24px;
      width: 375px;
      flex-shrink: 0;
    }
    .title-text {
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 28px;
      line-height: 120%;
      letter-spacing: -0.84px;
      color: rgba(0, 0, 0, 0.96);
      width: 327px;
    }

    /* Address Section */
    .address-section {
      display: flex;
      flex-direction: column;
      width: 375px;
      flex-grow: 1;
    }

    /* List Row */
    .list-row {
      display: flex;
      flex-direction: column;
      width: 375px;
      background: #FFFFFF;
    }
    .list-row-divider-top {
      width: 375px;
      height: 1px;
      background: #EFEFEF;
    }
    .list-row-content {
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      width: 375px;
      min-height: 67px;
      padding-top: 12px;
      padding-bottom: 12px;
    }

    /* Radio Button */
    .radio {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      position: relative;
    }
    .radio-outer {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #6A6A6A;
      box-sizing: border-box;
    }
    .radio-inner {
      position: absolute;
      width: 12px;
      height: 12px;
      left: 6px;
      top: 6px;
      border-radius: 50%;
      background: #714F8F;
      display: none;
    }
    .radio.selected .radio-inner {
      display: block;
    }

    /* Content area */
    .row-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      flex-grow: 1;
    }
    .row-primary {
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 16px;
      line-height: 130%;
      letter-spacing: -0.16px;
      color: rgba(0, 0, 0, 0.96);
    }
    .row-description {
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 150%;
      letter-spacing: -0.14px;
      color: rgba(0, 0, 0, 0.64);
    }

    /* Edit icon */
    .edit-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      cursor: pointer;
    }

    /* Delivery Row */
    .delivery-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      width: 375px;
      height: 24px;
      margin-bottom: 15px;
    }
    .delivery-label {
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 130%;
      letter-spacing: -0.14px;
      color: rgba(0, 0, 0, 0.64);
    }

    .list-row-divider-bottom {
      width: 375px;
      height: 1px;
      background: #EFEFEF;
    }

    /* Add address button */
    .btn-add-address {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px 24px;
      width: 237px;
      height: 48px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 16px;
      line-height: 130%;
      letter-spacing: -0.16px;
      color: #652590;
      margin-left: 0;
      align-self: flex-start;
      margin-left: 12px;
    }

    /* Toast */
    .toast {
      position: absolute;
      width: 327px;
      height: 56px;
      left: 50%;
      transform: translateX(-50%);
      top: 676px;
      background: #111111;
      border-radius: 12px;
      display: flex;
      align-items: center;
      padding: 16px;
      z-index: 2;
    }
    .toast-label {
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 400;
      font-size: 16px;
      line-height: 150%;
      letter-spacing: -0.16px;
      color: #FFFFFF;
    }

    /* Bottom Bar */
    .bottom-bar {
      width: 375px;
      height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 16px 24px;
      background: #FFFFFF;
      flex-shrink: 0;
      margin-top: auto;
    }
    .btn-continuar {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 327px;
      height: 48px;
      background: #714F8F;
      border-radius: 64px;
      border: none;
      cursor: pointer;
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 16px;
      line-height: 130%;
      letter-spacing: -0.16px;
      color: #FFFFFF;
    }
  </style>
</head>
<body>

  <div class="iphone-frame">
    <div class="iphone-screen">
      <div class="screen">

        <!-- Status Bar -->
        <div class="status-bar">
          <div class="status-bar-time">11:08</div>
          <div class="status-bar-icons">

          </div>
        </div>

        <!-- Top Bar with Progress -->
        <div class="top-bar">
          <button class="back-button" id="btn-back-26">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M20 11H7.83L13.42 5.41L12 4L4 12L12 20L13.41 18.59L7.83 13H20V11Z" fill="rgba(0,0,0,0.64)"/></svg>
          </button>
          <div class="progress-bar">
            <div class="progress-indicator"></div>
          </div>
        </div>

        <!-- Title -->
        <div class="title-section">
          <div class="title-text">Onde você quer receber sua roxinha?</div>
        </div>

        <!-- Address Section -->
        <div class="address-section">

          <!-- Address 1 (selected) -->
          <div class="list-row">
            <div class="list-row-divider-top"></div>
            <div class="list-row-content">
              <div class="radio selected">
                <div class="radio-outer"></div>
                <div class="radio-inner"></div>
              </div>
              <div class="row-content">
                <div class="row-primary">Rua Capote Valente, 39</div>
                <div class="row-description">Apto.302<br>Pinheiros, São Paulo - SP</div>
              </div>
              <div class="edit-icon">
                <img src="assets/icon-pencil.png" alt="Editar" width="24" height="24">
              </div>
            </div>
            <div class="delivery-row">
              <img src="assets/icon-truck.png" alt="Entrega" width="24" height="24">
              <span class="delivery-label">Em até 2 dias úteis</span>
            </div>
            <div class="list-row-divider-bottom"></div>
          </div>

          <!-- Address 2 (unselected) -->
          <div class="list-row">
            <div class="list-row-content">
              <div class="radio">
                <div class="radio-outer"></div>
                <div class="radio-inner"></div>
              </div>
              <div class="row-content">
                <div class="row-primary">Rua Ipiranga, bloco 2</div>
                <div class="row-description">Apto 203<br>Ipiranga, São Paulo - SP</div>
              </div>
              <div class="edit-icon">
                <img src="assets/icon-pencil.png" alt="Editar" width="24" height="24">
              </div>
            </div>
            <div class="delivery-row">
              <img src="assets/icon-truck.png" alt="Entrega" width="24" height="24">
              <span class="delivery-label">Em até 2 dias úteis</span>
            </div>
            <div class="list-row-divider-bottom"></div>
          </div>

          <!-- Add new address button -->
          <button class="btn-add-address">Adicionar novo endereço</button>

        </div>

        <!-- Toast -->
        <div class="toast" id="toast">
          <span class="toast-label">Endereço salvo com sucesso</span>
        </div>

        <!-- Bottom Bar -->
        <div class="bottom-bar">
          <button class="btn-continuar" id="btn-continuar">Continuar</button>
        </div>

      </div>
    </div>
  </div>

  <script>
    document.getElementById('btn-back-26').addEventListener('click', function() {
      window.location.href = 'screen-2-4.html';
    });

    document.querySelectorAll('.list-row').forEach(function(row) {
      row.addEventListener('click', function() {
        document.querySelectorAll('.radio').forEach(function(r) { r.classList.remove('selected'); });
        row.querySelector('.radio').classList.add('selected');
      });
    });

    document.getElementById('btn-continuar').addEventListener('click', function() {
      window.location.href = 'screen-3-1.html';
    });
  </script>

</body>
</html>

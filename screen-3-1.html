<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tela 3.1 - Dia da entrega</title>
  <style>
    @font-face {
      font-family: 'Graphik';
      src: url('assets/fonts/Graphik-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Graphik';
      src: url('assets/fonts/Graphik-Medium.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Graphik';
      src: url('assets/fonts/Graphik-Semibold.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'GraphikText';
      src: url('assets/fonts/Graphik-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'GraphikText';
      src: url('assets/fonts/Graphik-Medium.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'GraphikText';
      src: url('assets/fonts/Graphik-Semibold.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    button, input, select, textarea { font-family: inherit; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #F2F2F7;
      font-family: 'Graphik', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .iphone-frame {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100vh;
      height: 100dvh;
      background: none;
      border-radius: 0;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .iphone-screen {
      width: 100%;
      height: 100%;
      background: #FFFFFF;
      border-radius: 0;
      overflow: hidden;
      position: relative;
    }

    .screen {
      width: 100%;
      height: 100%;
      background: #FFFFFF;
      position: relative;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 18px 24px 10px 32px;
      width: 100%;
      height: 48px;
    }
    .status-bar-time {
      font-family: -apple-system, 'SF Pro Text', sans-serif;
      font-weight: 600;
      font-size: 15px;
      line-height: 20px;
      color: rgba(0, 0, 0, 0.96);
      letter-spacing: -0.24px;
    }
    .status-bar-icons { display: flex; align-items: center; gap: 5.5px; }

    .top-bar {
      display: flex;
      align-items: center;
      position: relative;
      width: 100%;
      height: 56px;
    }
    .back-button {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
    }
    .progress-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 128px;
      height: 2px;
      background: #EFEFEF;
      border-radius: 64px;
    }
    .progress-indicator {
      width: 64px;
      height: 2px;
      background: #714F8F;
      border-radius: 64px;
    }

    .content-wrapper {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 24px;
      width: 100%;
    }
    .title-section {
      padding: 8px 24px 0;
      width: 100%;
    }
    .title-text {
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 28px;
      line-height: 120%;
      letter-spacing: -0.84px;
      color: rgba(0, 0, 0, 0.96);
      width: 327px;
    }
    .subtitle-text {
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 400;
      font-size: 18px;
      line-height: 130%;
      letter-spacing: -0.18px;
      color: rgba(0, 0, 0, 0.64);
      width: 327px;
      margin-top: 8px;
    }

    .list-row {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      width: 100%;
      background: #FFFFFF;
    }
    .list-row-divider {
      width: 100%;
      height: 1px;
      background: #EFEFEF;
    }
    .list-row-content {
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      width: 100%;
      height: 56px;
    }
    .checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid #6A6A6A;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .checkbox.checked {
      background: #714F8F;
      border-color: #714F8F;
    }
    .checkbox.checked svg {
      display: block;
    }
    .checkbox svg {
      display: none;
    }
    .list-row-label {
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 16px;
      line-height: 130%;
      letter-spacing: -0.16px;
      color: rgba(0, 0, 0, 0.96);
    }

    .data-select {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      width: 100%;
      height: 48px;
    }
    .day-item {
      width: 48px;
      height: 48px;
      border-radius: 64px;
      border: 2px solid rgba(0, 0, 0, 0.08);
      background: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .day-item.selected {
      background: #F8F6F9;
      border-color: #714F8F;
    }
    .day-item-label {
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 20px;
      line-height: 120%;
      letter-spacing: -0.4px;
      color: rgba(0, 0, 0, 0.96);
      text-align: center;
      transition: color 0.15s;
    }
    .day-item.selected .day-item-label {
      color: #652590;
    }

    .bottom-bar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 24px;
      height: 80px;
    }
    .btn-primary {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 327px;
      height: 48px;
      background: #714F8F;
      border-radius: 64px;
      border: none;
      cursor: pointer;
    }
    .btn-primary-label {
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 16px;
      line-height: 130%;
      letter-spacing: -0.16px;
      color: #FFFFFF;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="iphone-frame">
    <div class="iphone-screen">
      <div class="screen">

        <!-- Status Bar -->
        <div class="status-bar">
          <div class="status-bar-time">11:08</div>
          <div class="status-bar-icons">
            <svg width="17" height="11" viewBox="0 0 17 11" fill="none"><path d="M2 6.667C2.552 6.667 3 7.115 3 7.667V9.667C3 10.219 2.552 10.667 2 10.667H1C0.448 10.667 0 10.219 0 9.667V7.667C0 7.115 0.448 6.667 1 6.667H2ZM6.667 4.667C7.219 4.667 7.667 5.115 7.667 5.667V9.667C7.667 10.219 7.219 10.667 6.667 10.667H5.667C5.115 10.667 4.667 10.219 4.667 9.667V5.667C4.667 5.115 5.115 4.667 5.667 4.667H6.667ZM11.333 2.333C11.885 2.333 12.333 2.781 12.333 3.333V9.667C12.333 10.219 11.885 10.667 11.333 10.667H10.333C9.781 10.667 9.333 10.219 9.333 9.667V3.333C9.333 2.781 9.781 2.333 10.333 2.333H11.333ZM16 0C16.552 0 17 0.448 17 1V9.667C17 10.219 16.552 10.667 16 10.667H15C14.448 10.667 14 10.219 14 9.667V1C14 0.448 14.448 0 15 0H16Z" fill="rgba(0,0,0,0.96)"/></svg>
            <svg width="15" height="11" viewBox="0 0 15.334 11" fill="none"><path d="M5.949 8.427C7.229 7.344 9.106 7.344 10.386 8.427C10.45 8.485 10.488 8.568 10.489 8.654C10.491 8.741 10.456 8.824 10.395 8.885L8.39 10.907C8.331 10.967 8.251 11 8.167 11C8.083 11 8.003 10.967 7.944 10.907L5.939 8.885C5.877 8.824 5.843 8.741 5.845 8.654C5.847 8.568 5.884 8.485 5.948 8.427ZM3.273 5.73C6.032 3.165 10.304 3.165 13.064 5.73C13.126 5.79 13.161 5.872 13.162 5.959C13.163 6.045 13.129 6.128 13.068 6.19L11.909 7.36C11.79 7.48 11.597 7.482 11.475 7.365C10.569 6.546 9.389 6.092 8.167 6.092C6.946 6.092 5.768 6.546 4.862 7.365C4.74 7.482 4.546 7.48 4.427 7.36L3.269 6.19C3.208 6.128 3.173 6.045 3.174 5.959C3.175 5.872 3.21 5.79 3.273 5.73ZM0.597 3.039C4.829 -1.013 11.504 -1.013 15.736 3.039C15.798 3.099 15.833 3.182 15.833 3.268C15.833 3.353 15.8 3.436 15.739 3.497L14.579 4.667C14.46 4.787 14.265 4.788 14.144 4.67C12.531 3.138 10.392 2.284 8.167 2.284C5.942 2.284 3.802 3.138 2.19 4.67C2.068 4.788 1.874 4.787 1.755 4.667L0.594 3.497C0.533 3.436 0.5 3.353 0.5 3.268C0.5 3.182 0.535 3.099 0.597 3.039Z" fill="rgba(0,0,0,0.96)"/></svg>
            <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.833" width="21" height="10.333" rx="3.5" stroke="rgba(0,0,0,0.96)" stroke-opacity="0.35"/><path opacity="0.4" d="M23 4V8C23.805 7.661 24.328 6.873 24.328 6C24.328 5.127 23.805 4.339 23 4" fill="rgba(0,0,0,0.96)"/><rect x="2" y="2.333" width="18" height="7.333" rx="2.3" fill="rgba(0,0,0,0.96)"/></svg>
          </div>
        </div>

        <!-- Top Bar -->
        <div class="top-bar">
          <button class="back-button" id="btn-back">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M20 11H7.83L13.42 5.41L12 4L4 12L12 20L13.41 18.59L7.83 13H20V11Z" fill="rgba(0,0,0,0.64)"/></svg>
          </button>
          <div class="progress-bar">
            <div class="progress-indicator"></div>
          </div>
        </div>

        <!-- Content Wrapper -->
        <div class="content-wrapper">

          <!-- Title Section -->
          <div class="title-section">
            <div class="title-text">Quais são os dias que podemos entregar?</div>
            <div class="subtitle-text">Selecione os dias da semana que uma pessoa estará presente para receber.</div>
          </div>

          <!-- Data Select - Days -->
          <div class="data-select">
            <div class="day-item" data-day="seg">
              <span class="day-item-label">Seg</span>
            </div>
            <div class="day-item selected" data-day="ter">
              <span class="day-item-label">Ter</span>
            </div>
            <div class="day-item selected" data-day="qua">
              <span class="day-item-label">Qua</span>
            </div>
            <div class="day-item selected" data-day="qui">
              <span class="day-item-label">Qui</span>
            </div>
            <div class="day-item selected" data-day="sex">
              <span class="day-item-label">Sex</span>
            </div>
            <div class="day-item" data-day="sab">
              <span class="day-item-label">Sáb</span>
            </div>
          </div>

          <!-- List Row - Selecionar todos -->
          <div class="list-row">
            <div class="list-row-content">
              <div class="checkbox" id="checkbox-all">
                <svg width="14" height="10" viewBox="0 0 14 10" fill="none"><path d="M1 5L5 9L13 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
              <span class="list-row-label">Selecionar todos</span>
            </div>
          </div>

        </div><!-- end content-wrapper -->

        <!-- Bottom Bar -->
        <div class="bottom-bar">
          <button class="btn-primary" id="btn-continuar">
            <span class="btn-primary-label">Continuar</span>
          </button>
        </div>

      </div>
    </div>
  </div>

  <script>
    var days = document.querySelectorAll('.day-item');
    var checkboxAll = document.getElementById('checkbox-all');

    function updateCheckboxState() {
      var allSelected = Array.from(days).every(function(d) {
        return d.classList.contains('selected');
      });
      if (allSelected) {
        checkboxAll.classList.add('checked');
      } else {
        checkboxAll.classList.remove('checked');
      }
    }

    days.forEach(function(day) {
      day.addEventListener('click', function() {
        day.classList.toggle('selected');
        updateCheckboxState();
      });
    });

    checkboxAll.addEventListener('click', function() {
      var allSelected = Array.from(days).every(function(d) {
        return d.classList.contains('selected');
      });
      if (allSelected) {
        days.forEach(function(d) { d.classList.remove('selected'); });
        checkboxAll.classList.remove('checked');
      } else {
        days.forEach(function(d) { d.classList.add('selected'); });
        checkboxAll.classList.add('checked');
      }
    });

    updateCheckboxState();

    document.getElementById('btn-back').addEventListener('click', function() {
      window.location.href = 'screen-6-1.html';
    });

    document.getElementById('btn-continuar').addEventListener('click', function() {
      var selected = [];
      var dayNames = { seg: 'Segunda-feira', ter: 'Terça-feira', qua: 'Quarta-feira', qui: 'Quinta-feira', sex: 'Sexta-feira', sab: 'Sábado' };
      days.forEach(function(d) {
        if (d.classList.contains('selected')) selected.push(d.dataset.day);
      });
      if (selected.length > 0) {
        var label;
        if (selected.length === 6) {
          label = 'Todos os dias';
        } else if (selected.length === 1) {
          label = dayNames[selected[0]];
        } else {
          label = dayNames[selected[0]] + ' a ' + dayNames[selected[selected.length - 1]];
        }
        localStorage.setItem('pos-selected-days', JSON.stringify({ days: selected, label: label }));
      }
      window.location.href = 'screen-6-1.html';
    });
  </script>

</body>
</html>

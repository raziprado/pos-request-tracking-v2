<head>

    @font-face {

      font-style: normal;

    }
    @font-face {
      font-family: 'GraphikText';
      src: url('assets/fonts/Graphik-Regular.woff2') format('woff2');

      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'GraphikText';
      src: url('assets/fonts/Graphik-Medium.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {

      src: url('assets/fonts/Graphik-Semibold.woff2') format('woff2');

      font-style: normal;
      font-display: swap;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    button, input, select, textarea { font-family: inherit; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #F2F2F7;
      font-family: 'Graphik', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .iphone-frame {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100vh;
      height: 100dvh;
      background: none;
      border-radius: 0;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .iphone-screen {
      width: 100%;
      height: 100%;
      background: #FFFFFF;
      border-radius: 0;
      overflow: hidden;
      position: relative;
    }

    .screen {
      width: 100%;
      height: 100%;
      background: #FFFFFF;
      position: relative;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 18px 24px 10px 32px;
      width: 100%;
      height: 48px;
    }
    .status-bar-time {

      font-size: 15px;
      line-height: 20px;
      color: rgba(0, 0, 0, 0.96);
      letter-spacing: -0.24px;
    }
    .status-bar-icons {
      display: flex;
      align-items: center;
      gap: 5.5px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      position: relative;
      width: 100%;
      height: 56px;
    }
    .back-button {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .title-section {
      padding: 8px 24px 24px;
      width: 100%;
    }
    .title-text {
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 28px;
      line-height: 120%;
      letter-spacing: -0.84px;
      color: rgba(0, 0, 0, 0.96);
      width: 327px;
    }

    .content-area {
      position: absolute;
      left: 0;
      top: 216px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .input-wrapper {
      width: 327px;
      display: flex;
      flex-direction: column;
    }
    .cep-input {
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 28px;
      line-height: 120%;
      letter-spacing: -0.84px;
      color: rgba(0, 0, 0, 0.96);
      border: none;
      outline: none;
      width: 327px;
      height: 34px;
      caret-color: #652590;
    }
    .cep-input::placeholder {
      color: rgba(0, 0, 0, 0.32);
    }
    .input-divider {
      width: 327px;
      height: 2px;
      background: #EFEFEF;
      margin-top: 6px;
    }

    .address-info {
      display: none;
      width: 327px;
      flex-direction: column;
      gap: 4px;
    }
    .address-info.visible {
      display: flex;
    }
    .address-label {
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 14px;
      line-height: 130%;
      letter-spacing: -0.14px;
      color: rgba(0, 0, 0, 0.64);
    }

    .delivery-info {
      display: none;
      width: 100%;
      flex-direction: row;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      height: 24px;
    }
    .delivery-info.visible {
      display: flex;
    }
    .delivery-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .delivery-label {
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 130%;
      letter-spacing: -0.14px;
      color: rgba(0, 0, 0, 0.64);
    }

    .next-action {
      position: absolute;
      right: 24px;
      bottom: 258px;
    }
    .next-btn {
      width: 48px;
      height: 48px;
      border-radius: 64px;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    .next-btn.disabled {
      background: #EFEFEF;
    }
    .next-btn.enabled {
      background: #714F8F;
    }

    .keyboard {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 242px;
      background: #D0D5DB;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6.5px 8px 0;
    }
    @media (pointer: coarse) {
      .keyboard {
        display: none !important;
      }
    }
    .keyboard-rows {
      width: 359px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .keyboard-row {
      display: flex;
      gap: 6px;
      justify-content: center;
    }
    .key {
      width: 113px;
      height: 46px;
      background: #FFFFFF;
      border-radius: 4px;
      box-shadow: 0px 1px 0px rgba(0, 0, 0, 0.35);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: none;
      font-family: -apple-system, 'SF Pro Text', sans-serif;
      cursor: pointer;
    }
    .key:active {
      background: #E0E0E0;
    }
    .key-number {
      font-size: 24px;
      font-weight: 400;
      line-height: 28px;
      color: #030303;
    }
    .key-letters {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 1px;
      color: #030303;
      line-height: 13px;
    }
    .key-action {
      width: 89px;
      background: transparent;
      box-shadow: none;
    }
  </style>
</head>
<body>

  <script>
    var input = document.getElementById('cep-input');
    var addressInfo = document.getElementById('address-info');
    var deliveryInfo = document.getElementById('delivery-info');
    var nextBtn = document.getElementById('next-btn');
    var nextArrow = document.getElementById('next-arrow');

    function formatCEP(digits) {
      if (digits.length <= 5) return digits;
      return digits.slice(0, 5) + '-' + digits.slice(5);
    }

    function updateState() {
      var raw = input.value.replace(/\D/g, '');
      if (raw.length >= 8) {
        addressInfo.classList.add('visible');
        deliveryInfo.classList.add('visible');
        nextBtn.classList.remove('disabled');
        nextBtn.classList.add('enabled');
        nextArrow.querySelector('path').setAttribute('fill', '#FFFFFF');
      } else {
        addressInfo.classList.remove('visible');
        deliveryInfo.classList.remove('visible');
        nextBtn.classList.remove('enabled');
        nextBtn.classList.add('disabled');
        nextArrow.querySelector('path').setAttribute('fill', 'rgba(0,0,0,0.32)');
      }
    }

    document.querySelectorAll('.key[data-val]').forEach(function(key) {
      key.addEventListener('click', function() {
        var raw = input.value.replace(/\D/g, '');
        if (raw.length >= 8) return;
        raw += this.getAttribute('data-val');
        input.value = formatCEP(raw);
        updateState();
      });
    });

    document.getElementById('key-backspace').addEventListener('click', function() {
      var raw = input.value.replace(/\D/g, '');
      if (raw.length === 0) return;
      raw = raw.slice(0, -1);
      input.value = formatCEP(raw);
      updateState();
    });

    input.addEventListener('input', function() {
      var raw = this.value.replace(/\D/g, '').slice(0, 8);
      this.value = formatCEP(raw);
      updateState();
    });

    document.getElementById('btn-back-22').addEventListener('click', function() {
      window.location.href = 'screen-2-1.html';
    });

    nextBtn.addEventListener('click', function() {
      if (nextBtn.classList.contains('enabled')) {
        window.location.href = 'screen-2-4.html';
      }
    });
  </script>

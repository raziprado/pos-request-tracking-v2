<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Confetti pieces -->
  <circle cx="22" cy="30" r="3" fill="#A087AE"/>
  <circle cx="75" cy="22" r="2.5" fill="#714F8F"/>
  <circle cx="15" cy="55" r="2" fill="#EADBF1"/>
  <rect x="30" y="18" width="4" height="4" rx="1" transform="rotate(-30 30 18)" fill="#714F8F"/>
  <rect x="68" y="35" width="3.5" height="3.5" rx="0.8" transform="rotate(20 68 35)" fill="#EADBF1"/>
  <rect x="18" y="42" width="3" height="3" rx="0.7" transform="rotate(-45 18 42)" fill="#A087AE"/>
  <circle cx="80" cy="50" r="2" fill="#EADBF1" opacity="0.7"/>
  <rect x="25" y="22" width="5" height="2" rx="1" transform="rotate(-50 25 22)" fill="#EADBF1"/>
  <rect x="72" y="28" width="4" height="1.5" rx="0.75" transform="rotate(40 72 28)" fill="#A087AE"/>

  <!-- Box body -->
  <rect x="28" y="52" width="50" height="38" rx="4" fill="#EADBF1"/>
  <!-- Box stripe vertical -->
  <rect x="48" y="52" width="10" height="38" fill="#A087AE"/>
  <!-- Box bottom shadow -->
  <rect x="28" y="84" width="50" height="6" rx="2" fill="#C3B2CA" opacity="0.4"/>

  <!-- Lid -->
  <g transform="translate(53, 40) rotate(12)">
    <rect x="-30" y="0" width="60" height="14" rx="3" fill="#C3B2CA"/>
    <rect x="-5" y="-8" width="10" height="8" rx="2" fill="#A087AE"/>
    <!-- Lid stripe -->
    <rect x="-5" y="0" width="10" height="14" fill="#A087AE"/>
    <!-- Bow loops -->
    <ellipse cx="-8" cy="-6" rx="7" ry="5" fill="none" stroke="#A087AE" stroke-width="2.5"/>
    <ellipse cx="8" cy="-6" rx="7" ry="5" fill="none" stroke="#714F8F" stroke-width="2.5"/>
  </g>
</svg>
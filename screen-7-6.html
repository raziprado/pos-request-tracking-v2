<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sucesso (sem código)</title>
  <style>
    @font-face {
      font-family: 'Graphik';
      src: url('assets/fonts/Graphik-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Graphik';
      src: url('assets/fonts/Graphik-Medium.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Graphik';
      src: url('assets/fonts/Graphik-Semibold.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'GraphikText';
      src: url('assets/fonts/Graphik-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'GraphikText';
      src: url('assets/fonts/Graphik-Medium.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'GraphikText';
      src: url('assets/fonts/Graphik-Semibold.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    button, input, select, textarea { font-family: inherit; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f0f0;
      font-family: 'Graphik', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .iphone-frame {
      width: 100%;
      max-width: 430px;
      height: 100vh;
      background: none;
      border-radius: 0;
      padding: 0;
      position: relative;
    }
    .iphone-screen {
      width: 100%;
      height: 100%;
      background: #fff;
      border-radius: 0;
      overflow: hidden;
      position: relative;
    }
    .screen {
      width: 100%;
      height: 100%;
      position: relative;
      background: #FFFFFF;
      overflow: hidden;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 18px 24px 10px 32px;
      height: 48px;
    }
    .status-time {
      font-family: 'SF Pro Text', -apple-system, sans-serif;
      font-weight: 600;
      font-size: 15px;
      line-height: 20px;
      letter-spacing: -0.24px;
      color: rgba(0,0,0,0.96);
    }
    .status-icons { display: flex; gap: 5px; align-items: center; }

    .top-bar {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 12px;
    }
    .close-btn {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
    }

    .artwork {
      padding: 8px 24px;
      height: 166px;
      display: flex;
      align-items: flex-start;
    }
    .illustration {
      width: 150px;
      height: 150px;
    }
    .illustration img {
      width: 150px;
      height: 150px;
      object-fit: contain;
    }

    .title-section {
      padding: 12px 24px 24px;
    }
    .title-text {
      font-weight: 500;
      font-size: 28px;
      line-height: 120%;
      letter-spacing: -0.84px;
      color: rgba(0,0,0,0.96);
      margin-bottom: 8px;
    }
    .subtitle-text {
      font-weight: 400;
      font-size: 18px;
      line-height: 130%;
      letter-spacing: -0.18px;
      color: rgba(0,0,0,0.64);
    }

    .card-section {
      position: absolute;
      top: 505px;
      left: 0;
      width: 100%;
      padding: 0 24px;
    }
    .card {
      border: 1px solid #EFEFEF;
      border-radius: 24px;
      overflow: hidden;
    }
    .card-row-label {
      display: flex;
      align-items: center;
      padding: 16px 24px 0;
      height: 56px;
    }
    .card-label-text {
      font-weight: 400;
      font-size: 12px;
      line-height: 130%;
      color: rgba(0,0,0,0.64);
    }
    .card-row-info {
      padding: 0 24px 20px;
      display: flex;
      align-items: center;
    }
    .card-info-text {
      font-weight: 400;
      font-size: 14px;
      line-height: 130%;
      letter-spacing: -0.14px;
      color: rgba(0,0,0,0.96);
    }

    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80px;
      background: #FFFFFF;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px 24px;
    }
    .btn-primary {
      width: 327px;
      height: 48px;
      background: #714F8F;
      border-radius: 64px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary-label {
      font-weight: 500;
      font-size: 16px;
      line-height: 130%;
      letter-spacing: -0.16px;
      color: #FFFFFF;
    }
  </style>
</head>
<body>

  <div class="iphone-frame">
    <div class="iphone-screen">
      <div class="screen">

        <div class="status-bar">
          <div class="status-time">11:08</div>
          <div class="status-icons">

            <svg width="15" height="11" viewBox="0 0 15.334 11" fill="none"><path d="M5.949 8.427C7.229 7.344 9.106 7.344 10.386 8.427C10.45 8.485 10.488 8.568 10.489 8.654C10.491 8.741 10.456 8.824 10.395 8.885L8.39 10.907C8.331 10.967 8.251 11 8.167 11C8.083 11 8.003 10.967 7.944 10.907L5.939 8.885C5.877 8.824 5.843 8.741 5.845 8.654C5.847 8.568 5.884 8.485 5.948 8.427ZM3.273 5.73C6.032 3.165 10.304 3.165 13.064 5.73C13.126 5.79 13.161 5.872 13.162 5.959C13.163 6.045 13.129 6.128 13.068 6.19L11.909 7.36C11.79 7.48 11.597 7.482 11.475 7.365C10.569 6.546 9.389 6.092 8.167 6.092C6.946 6.092 5.768 6.546 4.862 7.365C4.74 7.482 4.546 7.48 4.427 7.36L3.269 6.19C3.208 6.128 3.173 6.045 3.174 5.959C3.175 5.872 3.21 5.79 3.273 5.73ZM0.597 3.039C4.829 -1.013 11.504 -1.013 15.736 3.039C15.798 3.099 15.833 3.182 15.833 3.268C15.833 3.353 15.8 3.436 15.739 3.497L14.579 4.667C14.46 4.787 14.265 4.788 14.144 4.67C12.531 3.138 10.392 2.284 8.167 2.284C5.942 2.284 3.802 3.138 2.19 4.67C2.068 4.788 1.874 4.787 1.755 4.667L0.594 3.497C0.533 3.436 0.5 3.353 0.5 3.268C0.501 3.182 0.536 3.099 0.597 3.039Z" fill="rgba(0,0,0,0.96)"/></svg>
            <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.833" width="21" height="10.333" rx="3.5" stroke="rgba(0,0,0,0.96)" stroke-opacity="0.35"/><path opacity="0.4" d="M23 4V8C23.805 7.661 24.328 6.873 24.328 6C24.328 5.127 23.805 4.339 23 4" fill="rgba(0,0,0,0.96)"/><rect x="2" y="2.333" width="18" height="7.333" rx="2.3" fill="rgba(0,0,0,0.96)"/></svg>
          </div>
        </div>

        <div class="top-bar">
          <button class="close-btn" id="close-btn">
            <svg width="24" height="24" viewBox="0 0 20 20" fill="none">
              <g transform="translate(3.577, 3.577)">
                <path d="M6.42259 7.6011L11.6667 12.8452L12.8452 11.6667L7.6011 6.42259L12.8452 1.17851L11.6667 0L6.42259 5.24408L1.17851 0L0 1.17851L5.24408 6.42259L0 11.6667L1.17851 12.8452L6.42259 7.6011Z" fill="rgba(0,0,0,0.64)"/>
              </g>
            </svg>
          </button>
        </div>

        <div class="artwork">
          <div class="illustration">
            <img src="assets/pos-terminal-confirm.png" alt="">
          </div>
        </div>

        <div class="title-section">
          <div class="title-text">Confirmado, Maria, mais um passo juntos</div>
          <div class="subtitle-text">Junto com a roxinha, enviamos uma surpresa para celebrar nossa nova parceria.</div>
        </div>

        <div class="card-section">
          <div class="card">
            <div class="card-row-label">
              <div class="card-label-text">Recebimento sem código</div>
            </div>
            <div class="card-row-info">
              <div class="card-info-text">A confirmação da entrega será feita com identificação e assinatura.</div>
            </div>
          </div>
        </div>

        <div class="bottom-bar">
          <button class="btn-primary" id="btn-acompanhar">
            <span class="btn-primary-label">Acompanhar entrega</span>
          </button>
        </div>

      </div>
    </div>
  </div>

  <script>
    document.getElementById('close-btn').addEventListener('click', function() {
      window.location.href = 'index.html';
    });

    document.getElementById('btn-acompanhar').addEventListener('click', function() {
      window.location.href = 'tracking/index.html?nocode=1';
    });
  </script>

</body>
</html>

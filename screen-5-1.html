    * { margin: 0; padding: 0; box-sizing: border-box; }
    button, input, select, textarea { font-family: inherit; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #F2F2F7;
      font-family: 'Graphik', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .iphone-frame {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100vh;
      background: none;
      border-radius: 0;
      box-shadow: none;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .iphone-screen {
      width: 100%;
      height: 100%;
      background: #FFFFFF;
      border-radius: 0;
      overflow: hidden;
      position: relative;
    }

    .screen {
      width: 100%;
      height: 100%;
      background: #FFFFFF;
      position: relative;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 18px 24px 10px 32px;
      width: 100%;
      height: 48px;
    }
    .status-bar-time {
      font-family: -apple-system, 'SF Pro Text', sans-serif;
      font-weight: 600;
      font-size: 15px;
      line-height: 20px;
      color: rgba(0, 0, 0, 0.96);
      letter-spacing: -0.24px;
    }
    .status-bar-icons { display: flex; align-items: center; gap: 5.5px; }

    .top-bar {
      display: flex;
      align-items: center;
      position: relative;
      width: 100%;
      height: 56px;
    }
    .back-button {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
    }
    .progress-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 128px;
      height: 2px;
      background: #EFEFEF;
      border-radius: 64px;
    }
    .progress-indicator {
      width: 95px;
      height: 2px;
      background: #714F8F;
      border-radius: 64px;
    }

    .title-section {
      padding: 8px 24px 24px;
      width: 100%;
    }
    .title-text {
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 28px;
      line-height: 120%;
      letter-spacing: -0.84px;
      color: rgba(0, 0, 0, 0.96);
      width: 327px;
    }
    .subtitle-text {
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 400;
      font-size: 18px;
      line-height: 130%;
      letter-spacing: -0.18px;
      color: rgba(0, 0, 0, 0.64);
      width: 327px;
      margin-top: 8px;
    }

    .list-rows {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .list-row {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 56px;
      background: #FFFFFF;
      cursor: pointer;
    }
    .list-row-divider-top {
      width: 100%;
      height: 1px;
    }
    .list-row-content {
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      width: 100%;
      height: 24px;
      flex: 1;
    }
    .list-row-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .list-row-label {
      font-family: 'Graphik', -apple-system, sans-serif;
      font-weight: 400;
      font-size: 16px;
      line-height: 130%;
      letter-spacing: -0.16px;
      color: rgba(0, 0, 0, 0.96);
      flex: 1;
    }
    .list-row-chevron {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .list-row-divider-bottom {
      width: 100%;
      height: 1px;
      background: #EFEFEF;
    }

  </style>
</head>
